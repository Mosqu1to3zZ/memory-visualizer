<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Memory - 知识图谱可视化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        #graph-container {
            width: 100%;
            height: 70vh;
            background: linear-gradient(135deg, #0a2463 0%, #1e3a8a 100%);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .node-label {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #0a2463;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .edge-label {
            background: rgba(255, 215, 0, 0.9);
            border: 1px solid #d4af37;
            border-radius: 3px;
            padding: 2px 6px;
            font-size: 10px;
            color: #0a2463;
            font-weight: 600;
        }
        
        .stats-card {
            transition: all 0.3s ease;
        }
        
        .stats-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(10, 36, 99, 0.2);
        }
        
        .loading {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-gradient-to-r from-blue-900 to-blue-800 text-white py-4 shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <i class="fas fa-project-diagram text-2xl text-yellow-400 mr-3"></i>
                    <h1 class="text-2xl font-bold">Graph Memory</h1>
                </div>
                <div class="text-sm text-blue-200">
                    知识图谱可视化 · 记忆浏览器
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="stats-card bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-blue-900 to-blue-700 flex items-center justify-center mr-4">
                        <i class="fas fa-circle-nodes text-white text-xl"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">节点数量</p>
                        <p class="text-2xl font-bold text-gray-800" id="node-count">-</p>
                    </div>
                </div>
            </div>
            <div class="stats-card bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-blue-900 to-blue-700 flex items-center justify-center mr-4">
                        <i class="fas fa-link text-white text-xl"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">关系数量</p>
                        <p class="text-2xl font-bold text-gray-800" id="edge-count">-</p>
                    </div>
                </div>
            </div>
            <div class="stats-card bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-yellow-500 to-yellow-600 flex items-center justify-center mr-4">
                        <i class="fas fa-sitemap text-white text-xl"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">社区数量</p>
                        <p class="text-2xl font-bold text-gray-800" id="community-count">-</p>
                    </div>
                </div>
            </div>
            <div class="stats-card bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-green-500 to-green-600 flex items-center justify-center mr-4">
                        <i class="fas fa-search text-white text-xl"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">最近更新</p>
                        <p class="text-lg font-bold text-gray-800" id="last-update">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 搜索和控制 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-2">搜索节点</label>
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="输入节点名称搜索..." 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>
                <div class="flex gap-2 items-end">
                    <button onclick="searchNodes()" class="bg-gradient-to-r from-blue-900 to-blue-700 text-white px-6 py-3 rounded-lg font-medium hover:shadow-lg transition-all">
                        <i class="fas fa-search mr-2"></i>搜索
                    </button>
                    <button onclick="resetGraph()" class="border-2 border-gray-300 px-6 py-3 rounded-lg font-medium hover:bg-gray-100 transition-all">
                        <i class="fas fa-redo mr-2"></i>重置
                    </button>
                </div>
            </div>
        </div>

        <!-- 图谱容器 -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6">
            <div id="graph-container"></div>
        </div>

        <!-- 节点详情 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white rounded-xl shadow-md p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fas fa-info-circle text-blue-900 mr-2"></i>
                    选中节点详情
                </h3>
                <div id="node-details" class="text-gray-600">
                    <p class="text-center text-gray-400 italic py-8">点击图谱中的节点查看详情</p>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fas fa-link text-yellow-600 mr-2"></i>
                    相关关系
                </h3>
                <div id="relations-list" class="text-gray-600">
                    <p class="text-center text-gray-400 italic py-8">选中节点后显示相关关系</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-100 border-t mt-12 py-6">
        <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
            <p>Graph Memory Visualizer • OpenClaw • Powered by vis.js</p>
        </div>
    </footer>

    <!-- vis.js -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script>
        let network = null;
        let nodes = null;
        let edges = null;
        let container = null;
        let data = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            container = document.getElementById('graph-container');
            loadGraphData();
        });

        // 从API加载数据
        async function loadGraphData() {
            try {
                // 这里需要通过后端API获取数据
                // 先显示加载状态
                document.getElementById('node-count').textContent = '...';
                document.getElementById('edge-count').textContent = '...';
                document.getElementById('community-count').textContent = '...';
                
                const response = await fetch('/api/nodes');
                const data = await response.json();
                
                if (response.error) {
                    throw new Error(response.error);
                }
                
                drawNetwork(data);
                updateStats(data.stats);
                
            } catch (error) {
                console.error('Failed to load graph data:', error);
                alert('加载图谱数据失败: ' + error.message);
            }
        }

        // 绘制网络图
        function drawNetwork(graphData) {
            nodes = new vis.DataSet(graphData.nodes);
            edges = new vis.DataSet(graphData.edges);

            data = {
                nodes: nodes,
                edges: edges
            };

            const options = {
                nodes: {
                    shape: 'dot',
                    size: 20,
                    font: {
                        size: 14,
                        color: '#0a2463',
                        face: 'Noto Sans SC'
                    },
                    borderWidth: 2,
                    borderColor: '#0a2463',
                    color: {
                        background: '#3e82fc',
                        highlight: {
                            background: '#d4af37',
                            border: '#0a2463'
                        }
                    }
                },
                edges: {
                    width: 2,
                    color: {
                        color: '#888',
                        highlight: '#d4af37'
                    },
                    arrows: {
                        to: {
                            enabled: true,
                            scaleFactor: 0.5
                        }
                    },
                    smooth: {
                        enabled: true,
                        type: 'continuous'
                    }
                },
                physics: {
                    enabled: true,
                    barnesHut: {
                        gravitationalConstant: -2000,
                        centralGravity: 0.3,
                        springLength: 150,
                        springConstant: 0.04,
                        damping: 0.09,
                        avoidOverlap: 0.1
                    },
                    stabilization: {
                        iterations: 1000,
                        updateInterval: 50,
                        fit: true
                    }
                },
                interaction: {
                    hover: true,
                    tooltip: true,
                    navigationButtons: true,
                    keyboard: {
                        enabled: true
                    }
                },
                groups: {
                    1: {
                        color: { background: '#0a2463', border: '#d4af37' },
                        font: { color: '#ffffff' }
                    },
                    2: {
                        color: { background: '#1e3a8a', border: '#d4af37' },
                        font: { color: '#ffffff' }
                    },
                    3: {
                        color: { background: '#3e82fc', border: '#0a2463' }
                    }
                }
            };

            network = new vis.Network(container, data, options);
            
            // 绑定点击事件
            network.on('click', function(params) {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    showNodeDetails(nodeId);
                }
            });
        }

        // 更新统计信息
        function updateStats(graphData) {
            document.getElementById('node-count').textContent = graphData.nodes.length;
            document.getElementById('edge-count').textContent = graphData.edges.length;
            
            // 计算社区数量（按group分组）
            const communities = new Set(graphData.nodes.map(n => n.group));
            document.getElementById('community-count').textContent = communities.size;
            
            // 更新最后更新时间
            const now = new Date();
            document.getElementById('last-update').textContent = now.toLocaleDateString('zh-CN');
        }

        // 显示节点详情
        function showNodeDetails(nodeId) {
            const node = nodes.get(nodeId);
            if (!node) return;
            
            let html = `
                <div class="border-b pb-4 mb-4">
                    <h4 class="text-xl font-bold text-gray-800">${node.label}</h4>
                    <p class="text-sm text-gray-500 mt-1">ID: ${node.id}</p>
                </div>
                <div class="space-y-2">
                    <div><span class="font-medium">分组:</span> ${node.group || 'none'}</div>
                    ${node.title ? `<div><span class="font-medium">描述:</span> ${node.title}</div>` : ''}
                </div>
            `;
            
            document.getElementById('node-details').innerHTML = html;
            
            // 显示相关关系
            showRelations(nodeId);
        }

        // 显示节点相关关系
        function showRelations(nodeId) {
            const allEdges = edges.get();
            const connectedEdges = allEdges.filter(edge => 
                edge.from === nodeId || edge.to === nodeId
            );
            
            let html = '';
            
            if (connectedEdges.length === 0) {
                html = '<p class="text-center text-gray-400 italic py-8">此节点没有关联关系</p>';
            } else {
                html = '<ul class="space-y-2">';
                connectedEdges.forEach(edge => {
                    const otherId = edge.from === nodeId ? edge.to : edge.from;
                    const otherNode = nodes.get(otherId);
                    const direction = edge.from === nodeId ? '→' : '←';
                    html += `
                        <li class="flex items-center py-2 border-b border-gray-100">
                            <span class="px-2 py-1 bg-yellow-100 text-yellow-800 rounded text-sm font-medium">${edge.label || 'related'}</span>
                            <span class="mx-2">${direction}</span>
                            <span class="font-medium">${otherNode ? otherNode.label : otherId}</span>
                        </li>
                    `;
                });
                html += '</ul>';
            }
            
            document.getElementById('relations-list').innerHTML = html;
        }

        // 搜索节点
        async function searchNodes() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            if (!searchText) {
                resetGraph();
                return;
            }
            
            const response = await fetch('/api/search?q=' + encodeURIComponent(searchText));
            const data = await response.json();
            
            if (data.error) {
                alert('搜索失败: ' + data.error);
                return;
            }
            
            if (data.nodes.length === 0) {
                alert('未找到匹配的节点');
                return;
            }
            
            drawNetwork(data);
            updateStats(data.stats);
        }

        // 重置图谱
        function resetGraph() {
            document.getElementById('search-input').value = '';
            document.getElementById('node-details').innerHTML = '<p class="text-center text-gray-400 italic py-8">点击图谱中的节点查看详情</p>';
            document.getElementById('relations-list').innerHTML = '<p class="text-center text-gray-400 italic py-8">选中节点后显示相关关系</p>';
            
            // 重新加载原始数据
            loadGraphData();
        }

        // 支持回车搜索
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchNodes();
            }
        });
    </script>
</body>
</html>
